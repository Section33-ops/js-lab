<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Duel</title>
  </head>
  <body>
    <p class="js-total-wins"></p>

    <input type="number" class="js-input" />

    <button onclick="checkUsrGuess()">Guess</button>
    <p class="js-feedback"></p>
    <p class="js-lives-feedback">Lives: 7</p>

    <button onclick="resetScore()">Reset Total Wins</button>

    <script>
      let computerNumber = Math.floor(Math.random() * 100 + 1);
      console.log(computerNumber);
      let playerLive = 7;
      let hasPlayerWon = false;
      let totalWins = Number(localStorage.getItem("duelWins")) || 0;
      document.querySelector(".js-total-wins").innerHTML =
        `Total Wins: ${totalWins}`;
      // function getUsrGuess() {
      //   let input = Number(document.querySelector(".input").value);

      //   console.log(input);
      //   return input;
      // }
      // function askUsrGuess() {
      //   let usrGuess = Number(prompt("Guess a number(1 - 100): "));
      //   return usrGuess;
      // }

      function resetScore() {
        totalWins = 0;
        localStorage.setItem("duelWins", totalWins);
        document.querySelector(".js-total-wins").innerHTML =
          `Total Wins: ${totalWins}`;
      }

      function checkUsrGuess() {
        // let usrGuess = getUsrGuess();
        let input = Number(document.querySelector(".js-input").value);
        console.log(input);

        // if (isNaN(input)) {
        //   // alert("Please enter a number :)");
        //   document.querySelector(".js-feedback").innerHTML =
        //     "Please enter a number :)";
        //   console.log("Please enter a number :)");
        // }
        if (playerLive === 0 || hasPlayerWon === true) {
          return;
        } else if (input === computerNumber) {
          // alert("Wow! You got it!");
          totalWins++;
          localStorage.setItem("duelWins", totalWins);
          document.querySelector(".js-feedback").innerHTML = "Wow! You got it!";
          console.log("Wow! You got it!");
          document.querySelector(".js-lives-feedback").innerHTML =
            `You Win! You have ${playerLive} lives left`;

          document.querySelector(".js-total-wins").innerHTML =
            `Total Wins: ${totalWins}`;

          hasPlayerWon = true;
        } else if (input > computerNumber) {
          // alert(`Mmmm. Lower!`);
          document.querySelector(".js-feedback").innerHTML = "Mmmm. Lower!";
          console.log("Mmmm. Lower!");
          playerLive--;

          document.querySelector(".js-lives-feedback").innerHTML =
            `Lives: ${playerLive}`;
        } else if (input < computerNumber) {
          // alert(`Mmmm. Higher.`);
          document.querySelector(".js-feedback").innerHTML = "Mmmm. Higher";
          console.log("Mmmm. Higher");
          playerLive--;
          document.querySelector(".js-lives-feedback").innerHTML =
            `Lives: ${playerLive}`;
        }
        if (playerLive === 0 && !hasPlayerWon) {
          document.querySelector(".js-feedback").innerHTML =
            `OOOh! You are out of lives. You had ${playerLive} chances! The number was ${computerNumber}`;
          console.log(
            `OOOh! You are out of lives. You had ${playerLive} chances!`,
          );
        }
      }

      // while (playerLive > 0) {
      //   checkUsrGuess();
      //   if (hasPlayerWon) {
      //     break;
      //   }
      // }

      // console.log(`User guess: ${usrGuess}`);
      // console.log(`Computer choise: ${computerNumber}`);
      // console.log(`Player lives: ${playerLive}`);
    </script>
  </body>
</html>
