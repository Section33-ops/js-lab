<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Duel</title>
  </head>
  <body>
    <script>
      let computerNumber = Math.floor(Math.random() * 100 + 1);
      let playerLive = 7;

      while (playerLive > 0) {
        let usrGuess = Number(prompt("Guess a number(1 - 100): "));

        if (isNaN(usrGuess)) {
          alert("Please enter a number :)");
          console.log("Please enter a number :)");
        } else if (usrGuess === computerNumber) {
          alert("Wow! You got it!");
          console.log("Wow! You got it!");
          break;
        } else if (usrGuess > computerNumber) {
          alert(`Mmmm. Lower!`);
          console.log("Mmmm. Lower!");
          playerLive--;
        } else if (usrGuess < computerNumber) {
          alert(`Mmmm. Higher.`);
          console.log("Mmmm. Higher");
          playerLive--;
        }
      }

      if (playerLive === 0) {
        alert(
          `OOOh! You are out of lives. You had ${playerLive} chances! The number was ${computerNumber}`,
        );
        console.log(
          `OOOh! You are out of lives. You had ${playerLive} chances!`,
        );
      }

      // console.log(`User guess: ${usrGuess}`);
      // console.log(`Computer choise: ${computerNumber}`);
      // console.log(`Player lives: ${playerLive}`);
    </script>
  </body>
</html>
