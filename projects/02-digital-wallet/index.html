<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Wallet</title>
  </head>
  <body>
    <script>
      const myWallet = {
        owner: "John Doe",
        balance: 10000,
        isLocked: false,
        deposit(amount) {
          if (!this.isLocked) {
            this.balance += amount;
            return this.balance;
          } else {
            return "Your account is locked";
          }
        },
        withDraw(amount) {
          if (!this.isLocked && amount <= this.balance) {
            this.balance -= amount;
            return this.balance;
          } else if (!this.isLocked && amount > this.balance) {
            return "Not enough balance";
          } else if (this.isLocked) {
            return "Your acoount is locked";
          }
        },
        toggleLock() {
          this.isLocked = !this.isLocked;
        },
      };

      console.log(`Owner: ${myWallet.owner}`);
      console.log(`Balance: ${myWallet.balance}`);
      console.log(`isLocked: ${myWallet.isLocked}`);
      console.log(myWallet.deposit(250));
      console.log(myWallet.withDraw(250));

      console.log(myWallet.toggleLock());
      console.log(`Balance: ${myWallet.balance}`);
      console.log(`isLocked: ${myWallet.isLocked}`);
      console.log(myWallet.deposit(250));
      console.log(myWallet.withDraw(250));
    </script>
  </body>
</html>
